<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="shortcut icon" href="/img/logo.svg" type="image/x-icon">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <main>
        <div class="container-images">
            <img src="img/cards.png" alt="">
        </div>
        <div class="container-form">
            <h2 class="title">Bem vindo de volta!</h2>
            <form action="/login" method="post">
                <label for="email">Email</label>
                <input name="email" class="input auth" type="email">
                <label for="password">Senha</label>
                <input name="password" class="input auth" type="password">
                <button class="btn auth primary">Enviar</button>
            </form>
            <a href="/signup">Ainda não é cadastrado? Cadastre-se.</a>
        </div>
    </main>
</body>
</html>
