<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="shortcut icon" href="/img/logo.svg" type="image/x-icon">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <main>
        <div class="container-images">
            <img src="img/cards.png" alt="">
        </div>
        <div class="container-form">
            <h2 class="title">Bem vindo a Arena!</h2>
            <form action="/signup" method="post">
                <label for="name">Nome</label>
                <input name="name" class="input auth" type="text">
                <label for="email">Email</label>
                <input name="email" class="input auth" type="email">
                <label for="telefone">Telefone</label>
                <input name="telefone" class="input auth" type="text">
                <label for="password">Senha</label>
                <input name="password" class="input auth" type="password">
                <button class="btn auth primary">Cadastrar</button>
            </form>
            <a href="/login">Já é cadastrado? Entrar.</a>
        </div>
    </main>
</body>
</html>
