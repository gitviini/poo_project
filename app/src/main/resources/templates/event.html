<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event</title>
    <link rel="shortcut icon" href="/img/logo.svg" type="image/x-icon">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/event.css">
</head>
<body>
    <header class="header">
        <a href="/">voltar</a>
    </header>
    <main>
        <h2 th:text="${event.title}" class="title"></h2>

        <hr>

        <p th:text="${event.date}" class="date"></p>

        <div class="container-banner">
            <!-- <img th:src="@{https://picsum.photos/id/{id}/1000/300(id=${event.price})}" alt=""> -->
             <img src="https://picsum.photos/1000/300" alt="">
        </div>

        <p th:text="${event.description}" class="description"></p>

        <div class="container-price">
            <span th:text="${event.currency}" class="currency"></span>
            <span th:text="${event.price}" class="price"></span>
        </div>
    </main>
</body>
</html>
